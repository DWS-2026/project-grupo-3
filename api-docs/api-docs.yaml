components:
  schemas:
    UserEditDTO:
      type: object
      properties:
        username:
          type: string
        description:
          type: string
        email:
          type: string
        password:
          type: string
          pattern: "^(?=.*[a-z])(?=.*[A-Z])(?=.*\\d)(?=.*[@$!%*?&._-]).*$"
    ReviewDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        description:
          type: string
        type:
          type: string
          enum:
          - PLANT
          - PRODUCT
        username:
          type: string
        video:
          $ref: "#/components/schemas/VideoDTO"
        plantSpecies:
          type: string
        product:
          type: string
    VideoDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        fileName:
          type: string
        contentType:
          type: string
        url:
          type: string
    ImageDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
    ProductDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
        price:
          type: number
          format: double
        active:
          type: boolean
        images:
          type: array
          items:
            $ref: "#/components/schemas/ImageDTO"
    PlantBasicDTO:
      type: object
      properties:
        cares:
          type: string
        name:
          type: string
          minLength: 1
        description:
          type: string
        species:
          type: string
          minLength: 1
        images:
          type: array
          items:
            $ref: "#/components/schemas/ImageDTO"
      required:
      - name
      - species
    OrderDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        username:
          type: string
        orderDate:
          type: string
          format: date-time
        status:
          type: string
        price:
          type: number
          format: double
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItemDTO"
    OrderItemDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        productName:
          type: string
        price:
          type: number
          format: double
        quantity:
          type: integer
          format: int32
        subtotal:
          type: number
          format: double
    UserValidationDTO:
      type: object
      properties:
        username:
          type: string
          minLength: 1
        description:
          type: string
        email:
          type: string
          format: email
          minLength: 1
        password:
          type: string
          maxLength: 2147483647
          minLength: 8
          pattern: "^(?=.*[a-z])(?=.*[A-Z])(?=.*\\d)(?=.*[@$!%*?&._-]).*$"
      required:
      - email
      - password
      - username
    CreateOrderItemDTO:
      type: object
      properties:
        productId:
          type: integer
          format: int64
        quantity:
          type: integer
          format: int32
    AuthResponse:
      type: object
      properties:
        status:
          type: string
          enum:
          - SUCCESS
          - FAILURE
        message:
          type: string
        error:
          type: string
    LoginRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
    UserBasicDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        username:
          type: string
        description:
          type: string
        email:
          type: string
        profilePhoto:
          $ref: "#/components/schemas/ImageDTO"
    Pageable:
      type: object
      properties:
        page:
          type: integer
          format: int32
          minimum: 0
        size:
          type: integer
          format: int32
          minimum: 1
        sort:
          type: array
          items:
            type: string
    PageMetadata:
      type: object
      properties:
        size:
          type: integer
          format: int64
        number:
          type: integer
          format: int64
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
          format: int64
    PagedModelProductDTO:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: "#/components/schemas/ProductDTO"
        page:
          $ref: "#/components/schemas/PageMetadata"
    PagedModelPlantBasicDTO:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: "#/components/schemas/PlantBasicDTO"
        page:
          $ref: "#/components/schemas/PageMetadata"
