<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <!-- To make the design responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Green Care</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <!-- External CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="/assets/css/main.css">
    <link rel="stylesheet" href="/assets/css/generalForm.css">
    <script src="https://code.jquery.com/jquery-3.6.4.min.js" integrity="sha256-oP6HI9z1XaZNBrJURtCoUT5SUnxFr8s3BzRl+cbzUq8=" crossorigin="anonymous"></script>

</head>
<body>
{{>header}}
<main class="form-signin w-100 m-auto" id="login-form">
    
    <form action="/User/configuration" method="post" enctype="multipart/form-data">
        <input type="hidden" name="_csrf" value="{{token}}"/>
        <img
                class="mb-4"
                src="/assets/images/temporalIcon.png"
                alt=""
                width="72"
                height="57"
        />
        <h3 class="h3 mb-3 fw-normal change-color">Configuración</h3>

        {{#emailError}}
        <div class="alert alert-warning">
            El correo ya existe.
        </div>
        {{/emailError}}

        <!-- email -->
        <div class="form-floating mb-3" id="email">
            <input
                    type="email"
                    class="form-control"
                    id="useremail"
                    name="email"
                    placeholder="Correo electronico" 
            />
            <label for="useremail">Introduzca su nuevo correo electronico (tendrá que volver a iniciar sesión)</label>
        </div>
        <!-- password -->
        <div class="form-floating" id="password">
            <input
                    type="password"
                    class="form-control"
                    id="floatingPassword"
                    name="password"
                    placeholder="Contraseña" 
            />
            <label for="floatingPassword mb-0">Introduzca su nueva contraseña (tendrá que volver a iniciar sesión)</label>
        </div>

        {{#passwordError}}
        <div class="alert alert-warning">
            Las contraseñas no coinciden.
        </div>
        {{/passwordError}}

        <!-- Confirm password -->
        <div class="form-floating mb-0" id="RepeatPassword">
            <input
                    type="password"
                    class="form-control"
                    id="floatinggPassword"
                    name="repeatpassword"
                    placeholder="Contraseña" 
            />
            <label for="floatinggPassword">Introduzca de nuevo su nueva contraseña</label>
        </div>


        {{#usernameError}}
        <div class="alert alert-warning">
            El nombre de usuario ya existe.
        </div>
        {{/usernameError}}

        <!-- User -->
        <div class="form-floating mb-3">
            <input
                    type="text"
                    class="form-control"
                    id="username"
                    name="username"
                    placeholder="Escribe tu nombre de usuario"
            />
            <label for="username">Nuevo Nombre de Usuario (tendrá que volver a iniciar sesión)</label>
        </div>


        <!-- Image -->
        <div class="mb-4 text-start">
            <label class="form-label change-color fw-medium">Elige nueva imagen de perfil</label>
            <input
                    class="form-control"
                    name="imageFile"
                    type="file"
                    id="userImage"
                    accept="image/*"
                    
            />
        </div>



        <!-- Description -->
        <div class="form-floating mb-3">
        <textarea
                class="form-control"
                placeholder="Descripción"
                id="profileDescription"
                style="height: 120px"
                name="description"
        ></textarea>
            <label for="profileDescription">Descripción</label>
        </div>


        <div class="buttons-container">
            <button type="submit" id="login-btn" class="btn btn-success rounded-pill px-4 py-3 main-button secondary">Sube tus cambios</button>
             <a href="/User/user" class="btn btn-success rounded-pill px-4 py-3 main-button">Cancelar</a>

        </div>

    </form>
</main>

{{>footer}}

</body>
</html>
