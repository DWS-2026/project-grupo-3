<!doctype html>
<html lang="es">
<head>
    <!--FAVICON -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Green Care</title>

    <!-- MODERN SVG FAVICON -->
    <link rel="icon" type="image/svg+xml" href="/assets/images/favicon/favicon.svg">
    <link rel="icon" type="image/x-icon" href="/assets/images/favicon/favicon.ico">

    <!-- APPLE/MOVILEPHONE -->
    <link rel="apple-touch-icon" href="/assets/images/favicon/apple-touch-icon.png">


    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <!-- External CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="/assets/css/main.css">
    <link rel="stylesheet" href="/assets/css/generalForm.css">
    <script src="https://code.jquery.com/jquery-3.6.4.min.js" integrity="sha256-oP6HI9z1XaZNBrJURtCoUT5SUnxFr8s3BzRl+cbzUq8=" crossorigin="anonymous"></script>

</head>
<body>
{{>header}}
<main class="form-signin w-100 m-auto" id="login-form">
    <form action="/login" method="post">
        <input type="hidden" name="_csrf" value="{{token}}"/>
                <img
                class="mb-4"
                src="/assets/images/temporalIcon.png"
                alt=""
                width="72"
                height="57"
        />
        <h3 class="h3 mb-3 fw-normal change-color">Por favor, inicia sesión</h3>
        {{#loginError}}
        <div class="alert alert-danger">
            Usuario, email o contraseña incorrectos.
        </div>
        {{/loginError}}
        <div class="form-floating" id="username">
            <input
                    type="text"
                    class="form-control"
                    id="floatingUsername"
                    name="username"
                    placeholder="" required
            />
            <label for="floatingUsername">Introduce tu nombre de usuario o tu dirección email</label>
        </div>
        <div class="form-floating" id="password">
            <input
                    type="password"
                    class="form-control"
                    id="floatingPassword"
                    placeholder="" required
                    name="password"
            />
            <label for="floatingPassword">Contraseña</label>
        </div>
        <div class="buttons-container">
            <button type="submit" class="btn btn-success rounded-pill px-4 py-3 fw-medium main-button">Iniciar Sesión</button>
        </div>


        <p class="license">
            Todavía no tiene una cuenta, regístrate a continuación
            <a href="/User/register" target="_green">Registrarse</a>
        </p>

    </form>
</main>

{{>footer}}

</body>
</html>
