<!DOCTYPE html>
<html lang="es">
<head>
    <!--FAVICON -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Green Care</title>

    <!-- MODERN SVG FAVICON -->
    <link rel="icon" type="image/svg+xml" href="/assets/images/favicon/favicon.svg">
    <link rel="icon" type="image/x-icon" href="/assets/images/favicon/favicon.ico">

    <!-- APPLE/MOVILEPHONE -->
    <link rel="apple-touch-icon" href="/assets/images/favicon/apple-touch-icon.png">


    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <!-- External CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="/assets/css/main.css">
    <link rel="stylesheet" href="/assets/css/management.css">
    <script src="https://code.jquery.com/jquery-3.6.4.min.js" integrity="sha256-oP6HI9z1XaZNBrJURtCoUT5SUnxFr8s3BzRl+cbzUq8=" crossorigin="anonymous"></script>

</head>
<body>
{{>header}}
<main class="header-main d-flex align-items-center flex-column">
    <h1>Gestión Usuarios</h1> <p class="lead"> Gestiona los usuarios, a quién eliminas, añades... </p>
    <table class="table table-bordered text-center">
        <thead class="table-success">
            <tr>
            <th>Seleccionar</th>
            <th>Nombres</th>
            <th>Descripción</th>
            <th>Link al perfil</th>
            </tr>
        </thead>
        <tbody>
            {{#users}}
            <tr>
            <td>
                <form action="/Admin/deleteUser/{{id}}" method="post">
                    <button type="submit" class="btn delete-btn">
                        🗑
                    </button>
                    <input type="hidden" name="_csrf" value="{{token}}"/>
                </form>
            </td>
            <td>{{username}}</td>
            <td>{{description}}</td>
            <td>    <p class="license" style="font-size: 20px;">
            <a href="/User/profile/{{id}}" target="_green">👤 {{username}}</a>
            </p></td>
            </tr>
            {{/users}}
    </tbody>
    </table>



    <div class="mb-3 buttons-container">
        <form action="/Admin/deleteAllUsers" method="post">
            <button class="btn btn-danger" id="delete-selected">Eliminar todos los usuario/s</button>
            <input type="hidden" name="_csrf" value="{{token}}"/>
        </form>
        <form action="/Admin/deleteAdmin" method="post">
            <button class="btn btn-danger" id="delete-selected">Eliminar al admin</button>
            <input type="hidden" name="_csrf" value="{{token}}"/>
        </form>
    </div>
</main>
{{>footer}}
</body>
</html>
