<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Green Care</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link rel="stylesheet" href="/assets/css/main.css">
    <link rel="stylesheet" href="/assets/css/management.css">
    <script src="https://code.jquery.com/jquery-3.6.4.min.js" crossorigin="anonymous"></script>
</head>
<body>
{{>header}}
<main class="header-main d-flex align-items-center flex-column">

    <h1>Gestión de Productos</h1>
    <p class="lead">Administra los productos de la tienda: añade, revisa o elimina.</p>

    <!-- PRODUCT TABLE -->
    <table class="table table-bordered text-center">
        <thead class="table-success">
        <tr>
            <th>Nombre</th>
            <th>Precio</th>
            <th>Imagen</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody id="product-table">
        {{#products}}
        <tr>
            <td>{{name}}</td>
            <td>€{{price}}</td>
            <td>
                {{#images}}
                <img src="/images/{{id}}" width="50">
                {{/images}}
                {{^images}}
                <img src="/assets/images/temporalIcon.png" width="50">
                {{/images}}
            </td>
            <td>
                <a href="/Products/editProduct/{{id}}" class="btn main-button btn-sm mb-1">Editar</a>
                <form action="/products/{{id}}/delete" method="post" style="display:inline;">
                    <button type="submit" class="btn btn-danger btn-sm mb-1">Eliminar</button>
                    <input type="hidden" name="_csrf" value="{{token}}"/>
                </form>
            </td>
        </tr>
        {{/products}}
        </tbody>
    </table>

    <div class="mb-3">
        <a href="/Products/newProduct" class="text-decoration-none">
            <button class="btn main-button">Añadir producto</button>
        </a>
    </div>
</main>
{{>footer}}
</body>
</html>
