<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Para hacer el diseño responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <!-- External CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="/assets/css/main.css">
    <script src="https://code.jquery.com/jquery-3.6.4.min.js" integrity="sha256-oP6HI9z1XaZNBrJURtCoUT5SUnxFr8s3BzRl+cbzUq8=" crossorigin="anonymous"></script>

    <link rel="stylesheet" href="/assets/css/generalForm.css">
</head>
<body>

<main class="header-main d-flex justify-content-center align-items-center flex-column change-color">
    <img
            class="mb-4"
            src="/assets/images/sadPlant.png"
            alt=""
            width="300"
            height="300"
    />
    {{#errorType}}
        <h2>Error: {{errorType}}</h2>
    {{/errorType}}
        <hr width="50%">
        <p>Lo sentimos, hubo una excepción.</p>
        <p class="license" style="font-size: 20px;">
            <a href="/" target="_green">Volver al inicio</a>
        </p>
        <hr width="50%">
    {{#errorMessage}}
        <small>Más detalles: {{errorMessage}}</small>
    {{/errorMessage}}
    {{#statusCode}}
        <small> Status Code: {{statusCode}}</small>
    {{/statusCode}}
</main>
</body>
</html>
