<!DOCTYPE html>
<html lang="es">
<head>
    <!--FAVICON -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Green Care</title>

    <!-- MODERN SVG FAVICON -->
    <link rel="icon" type="image/svg+xml" href="/assets/images/favicon/favicon.svg">
    <link rel="icon" type="image/x-icon" href="/assets/images/favicon/favicon.ico">

    <!-- APPLE/MOVILEPHONE -->
    <link rel="apple-touch-icon" href="/assets/images/favicon/apple-touch-icon.png">


    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/main.css">
    <link rel="stylesheet" href="/assets/css/catalogProductsAndPlants.css">
    <link rel="stylesheet" href="/assets/css/generalForm.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
</head>
<body>
{{>header}}

<main class="container py-5">
    <h2 class="text-center mb-4">Editar mis reviews</h2>
    <!-- BOTTONS -->
    <div class="buttons-container mt-3 m-auto text-center" style="padding-bottom: 20px;">
        <a href="/Reviews/forum" class="btn btn-success rounded-pill px-4 py-3 main-button">Cancelar</a>
        <!-- Open lateral forms -->
        <button class="btn btn-success rounded-pill px-4 py-3 main-button" type="button" data-bs-toggle="offcanvas" data-bs-target="#plantFormOffcanvas" aria-controls="plantFormOffcanvas">
            Editar campos de mis reviews
        </button>

    </div>
    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
        {{#review}}
        <!-- lateral forms -->
        <div class="offcanvas offcanvas-start" tabindex="-1" id="reviewsFormOffcanvas" aria-labelledby="reviewsFormOffcanvasLabel">
            <div class="offcanvas-header">
                <h5 class="offcanvas-title " id="reviewsFormOffcanvasLabel">Editar Review</h5>
                <button type="button" class="btn-close text-reset" data-bs-dismiss="offcanvas" aria-label="Cerrar"></button>
            </div>
            <div class="offcanvas-body">
                <form action="/Reviews/editReviews/{{id}}" method="post" enctype="multipart/form-data">
                    <input type="hidden" name="_csrf" value="{{token}}"/>

                    <!-- Name of the review -->
                    <div class="form-floating mb-3">
                        <input
                                type="text"
                                class="form-control"
                                id="reviewTitle{{id}}"
                                placeholder="Titulo"
                                value ="{{title}}"
                                name = "title"
                                required
                        />
                        <label for="reviewTitle{{id}}">Titulo de la review</label>
                    </div>

                    <!-- Review tipe -->
                    <div class="form-floating mb-3">
                        <select name="type" class="form-select form-select-sm">
                            <option value = "PLANT" selected>Planta</option>
                            <option value = "PRODUCT">Producto</option>
                        </select>
                    </div>

                    <!-- Description -->
                    <div class="form-floating mb-3">
        <textarea
                class="form-control"
                placeholder="Descripción"
                id="reviewDescription"
                style="height: 120px"
                name = "description"
                required>{{description}}
        </textarea>
                        <label for="reviewDescription">Descripción</label>
                    </div>

                    <button type="submit" class="btn btn-success rounded-pill px-4 py-3 main-button">Guardar cambios</button>
                </form>
            </div>
        </div>
    </div>
    {{/review}}

</main>

{{>footer}}
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
