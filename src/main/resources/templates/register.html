<!doctype html>
<html lang="es">
<head>
    <!--FAVICON -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Green Care</title>

    <!-- MODERN SVG FAVICON -->
    <link rel="icon" type="image/svg+xml" href="/assets/images/favicon/favicon.svg">
    <link rel="icon" type="image/x-icon" href="/assets/images/favicon/favicon.ico">

    <!-- APPLE/MOVILEPHONE -->
    <link rel="apple-touch-icon" href="/assets/images/favicon/apple-touch-icon.png">


    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <!-- External CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="/assets/css/main.css">
    <link rel="stylesheet" href="/assets/css/generalForm.css">
    <script src="https://code.jquery.com/jquery-3.6.4.min.js" integrity="sha256-oP6HI9z1XaZNBrJURtCoUT5SUnxFr8s3BzRl+cbzUq8=" crossorigin="anonymous"></script>

</head>
<body>
{{>header}}
<main class="form-signin w-100 m-auto" id="login-form">
    <form action="/User/register" method="post" enctype="multipart/form-data">
        <input type="hidden" name="_csrf" value="{{token}}"/>
        <img
                class="mb-4"
                src="/assets/images/temporalIcon.png"
                alt=""
                width="72"
                height="57"
        />
        <h3 class="h3 mb-3 fw-normal change-color">Por favor, registrese</h3>

        {{#emailError}}
        <div class="alert alert-warning">
            El correo ya existe.
        </div>
        {{/emailError}}

        <!-- email -->
        <div class="form-floating" id="email">
            <input
                    type="email"
                    class="form-control"
                    id="useremail"
                    name="email"
                    placeholder="Correo electronico" required
            />
            <label for="useremail">Introduzca su correo electronico</label>
        </div>
        <!-- password -->
        <div class="form-floating" id="password">
            <input
                    type="password"
                    class="form-control"
                    id="floatingPassword"
                    name="password"
                    placeholder="Contraseña" required
            />
            <label for="floatingPassword">Introduzca su contraseña</label>
        </div>

        {{#passwordError}}
        <div class="alert alert-warning">
            Las contraseñas no coinciden.
        </div>
        {{/passwordError}}

        <!-- Confirm password -->
        <div class="form-floating" id="RepeatPassword">
            <input
                    type="password"
                    class="form-control"
                    id="floatinggPassword"
                    name="repeatpassword"
                    placeholder="Contraseña" required
            />
            <label for="floatinggPassword">Introduzca de nuevo su contraseña</label>
        </div>


        {{#usernameError}}
        <div class="alert alert-warning">
            El nombre de usuario ya existe.
        </div>
        {{/usernameError}}

        <!-- User -->
        <div class="form-floating mb-3">
            <input
                    type="text"
                    class="form-control"
                    id="username"
                    name="username"
                    placeholder="Escribe tu nombre de usuario"
            />
            <label for="username">Nombre de Usuario</label>
        </div>


        <!-- Image -->
        <div class="mb-4 text-start">
            <label class="form-label change-color fw-medium">Elige imágen de perfil</label>
            <input
                    class="form-control"
                    name="imageFile"
                    type="file"
                    id="userImage"
                    accept="image/*"
                    required
            />
        </div>



        <!-- Description -->
        <div class="form-floating mb-3">
        <textarea
                class="form-control"
                placeholder="Descripción"
                id="profileDescription"
                style="height: 120px"
                name="description"
                required
        ></textarea>
            <label for="profileDescription">Descripción</label>
        </div>


        <!-- Terms of condition -->
        <div class="form-check text-start my-3">
            <input class="form-check-input"
                   type="checkbox"
                   value="accepted"
                   id="termsCheck"
                   required>
            <label class="form-check-label change-color" for="termsCheck">
                Acepto los términos y condiciones
            </label>
        </div>
        <div class="buttons-container">
            <button type="submit" id="login-btn" class="btn btn-success rounded-pill px-4 py-3 main-button secondary">Registrate</button>
        </div>
        <p class="license">
            ¿Ya tienes cuenta?
            <a href="/login" target="_green">Iniciar sesión</a>
        </p>


    </form>
</main>

{{>footer}}

</body>
</html>
